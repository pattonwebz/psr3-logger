name: Tests

on:
  push:
    branches: [ "master", "main" ]
  pull_request:

jobs:
  test:
    name: PHP ${{ matrix.php }} / psr/log ${{ matrix.psr-log }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [ "7.4", "8.0", "8.1", "8.2", "8.3" ]
        psr-log: [ "^1.1" ]
        include:
          # psr/log 2.x and 3.x require PHP 8+
          - php: "8.0"
            psr-log: "^2.0"
          - php: "8.1"
            psr-log: "^2.0"
          - php: "8.2"
            psr-log: "^2.0"
          - php: "8.3"
            psr-log: "^2.0"
          - php: "8.0"
            psr-log: "^3.0"
          - php: "8.1"
            psr-log: "^3.0"
          - php: "8.2"
            psr-log: "^3.0"
          - php: "8.3"
            psr-log: "^3.0"

    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: xdebug

      - name: Pin psr/log to ${{ matrix.psr-log }}
        run: composer require --no-update "psr/log:${{ matrix.psr-log }}"

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run tests
        run: composer test
        env:
          XDEBUG_MODE: coverage

      - name: Assert 100 % coverage (summary only)
        run: XDEBUG_MODE=coverage ./vendor/bin/phpunit --coverage-text --colors=never | grep -E "Lines:\s+100\.00"

